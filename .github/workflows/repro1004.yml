name: Reproduce JetBrains JDK 25 Bug
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Setup Java 25 with JetBrains
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: '25'
          cache: gradle