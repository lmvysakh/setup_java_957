name: Reproduce JetBrains JDK 25 Bug
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
 reproduce:
    runs-on: ubuntu-latest
    steps:
      # Exhaust unauthenticated GitHub API rate limit
      - name: Burn rate limit
        run: |
          for i in $(seq 1 65); do
            curl -s -o /dev/null -w "%{http_code}\n" \
              "https://api.github.com/repos/JetBrains/JetBrainsRuntime/releases?per_page=1&page=$i"
          done
          echo "Remaining rate limit:"
          curl -s https://api.github.com/rate_limit | jq '.rate'

      - name: Setup Java 25 with JetBrains
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: '25'